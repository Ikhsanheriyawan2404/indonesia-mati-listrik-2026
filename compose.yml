services:
  postgis:
    image: postgis/postgis:15-3.4
    container_name: postgis
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # ports:
    #   - "${DB_PORT}:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-be
    restart: always
    # ports:
    #   - "${PORT}:3000"
    env_file:
      - .env
    depends_on:
      postgis:

volumes:
  postgis_data: